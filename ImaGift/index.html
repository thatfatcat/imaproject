<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="3600">
    <title>Animation 19</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&family=Xanh+Mono:ital@0;1&display=swap');
        :root {
            --background-color: #000000;
            --main-text-color: #f0f0f0;
            --accent-color: #4a90e2; /* Cool blue */
            --secondary-text-color: #88dddd;
            --font-primary: 'Xanh Mono', 'Courier New', monospace;
            --font-display: 'VT323', monospace;
        }
        body, html {
            height: 100%; margin: 0; padding: 0; background-color: var(--background-color);
            color: var(--main-text-color); font-family: var(--font-primary); font-size: 16px;
            overflow: auto;
        }
        #plasma-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        .container, footer {
            position: relative;
            z-index: 1;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 4vw;
            min-height: 90vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        h1 {
            font-family: var(--font-display);
            font-size: 3rem;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: normal;
            margin-bottom: 1.5rem;
            text-shadow: 0 0 10px var(--accent-color);
        }
        p {
            margin-bottom: 1.5rem;
            width: 100%;
            max-width: 600px;
        }
        footer {
            text-align: center;
            padding: 2rem 0;
            font-size: 0.9rem;
            color: var(--secondary-text-color);
            margin-top: auto;
            width: 100%;
        }
        .styled-image {
            max-width: 90%; /* Responsive image */
            height: auto;
            border: 2px solid var(--accent-color);
            padding: 5px;
            background-color: rgba(255, 0, 255, 0.05); /* Transparent version of accent */
            box-shadow: 0 0 15px var(--accent-color);
            margin-top: 2rem;
        }
    </style>
</head>
<body>
    <canvas id="plasma-canvas"></canvas>
    <div class="container">
        <h1>[My_valentines_dinner]</h1>
        <img src="http://nonamer.xyz/media/valent.jpg" alt="Valentine's Day Image" class="styled-image">
    </div>
    <footer><p>
    
    <script>
        const canvas = document.getElementById('plasma-canvas');
        const ctx = canvas.getContext('2d');

        let time = 0;
        const gridSize = 10;
        const asciiChars = ['.', ':', '-', '=', '+', '*', '#', '%', '@'];

        function draw() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let y = 0; y < canvas.height; y += gridSize) {
                for (let x = 0; x < canvas.width; x += gridSize) {
                    const value = Math.sin(x / 50 + time) + Math.sin(y / 50 + time) + Math.sin((x + y) / 50 + time) + Math.sin(Math.sqrt(x*x + y*y) / 50 + time);
                    const normalized = (value + 4) / 8; // Normalize value to 0-1 range

                    const charIndex = Math.floor(normalized * (asciiChars.length - 1));
                    const character = asciiChars[charIndex];

                    const hue = 180 + normalized * 60; // From blue-green to lighter blue
                    ctx.fillStyle = `hsl(${hue}, 100%, 70%)`;
                    ctx.font = `${gridSize}px ${getComputedStyle(document.body).getPropertyValue('--font-primary')}`;
                    ctx.fillText(character, x, y);
                }
            }
            time += 0.03;
        }

        function animate() {
            draw();
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
