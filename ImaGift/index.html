<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="3600">
    <title>sumoerboul</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&family=Xanh+Mono:ital@0;1&display=swap');
        :root {
            --background-color: #000000;
            --main-text-color: #d0e0f0;
            --accent-color: #4a90e2;
            --secondary-text-color: #88aaff;
            --font-primary: 'Xanh Mono', 'Courier New', monospace;
            --font-display: 'VT323', monospace;
        }
        body, html {
            height: 100%; margin: 0; padding: 0; background-color: var(--background-color);
            color: var(--main-text-color); font-family: var(--font-primary); font-size: 16px;
            overflow: hidden;
        }
        #bubble-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        .container, footer {
            position: relative;
            z-index: 1;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 4vw;
            min-height: 90vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        h1 {
            font-family: var(--font-display);
            font-size: 3rem;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: normal;
            margin-bottom: 1.5rem;
            text-shadow: 0 0 10px var(--accent-color);
        }
        p {
            margin-bottom: 1.5rem;
            width: 100%;
            max-width: 600px;
        }
        footer {
            text-align: center;
            padding: 2rem 0;
            font-size: 0.9rem;
            color: var(--secondary-text-color);
            margin-top: auto;
            width: 100%;
        }
    </style>
</head>
<body>
    <canvas id="bubble-canvas"></canvas>
    <div class="container">
        <h1>[Message_of_the_day]</h1>
        <p>Watched the super bowl today. I have no clue whats going on but some friends are over and we're having a good time. I feel stressed about not doing stuff but I don't know what that stuff is. I wish I could just relax when I'm supposed to relax.</p>
</div>
    <footer><p>

    <script>
        const canvas = document.getElementById('bubble-canvas');
        const ctx = canvas.getContext('2d');

        let bubbles = [];
        const numBubbles = 100;
        const characters = '0123456789ABCDEF!@#$%^&*()_+-=[]{}|;:",.<>?/~'; // ASCII characters for bubbles

        function initializeBubbles() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            bubbles = [];
            for (let i = 0; i < numBubbles; i++) {
                bubbles.push(createBubble());
            }
        }

        function createBubble() {
            return {
                x: Math.random() * canvas.width,
                y: canvas.height + Math.random() * 200, // Start lower for a rising effect
                fontSize: Math.random() * 15 + 10, // Font size for characters
                speed: Math.random() * 2 + 0.5,
                opacity: Math.random() * 0.7 + 0.3,
                character: characters.charAt(Math.floor(Math.random() * characters.length))
            };
        }

        function drawBubbles() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < bubbles.length; i++) {
                let bubble = bubbles[i];
                bubble.y -= bubble.speed;

                if (bubble.y < -bubble.fontSize) { // Reset when off-screen
                    bubbles[i] = createBubble();
                    bubbles[i].y = canvas.height + bubbles[i].fontSize;
                }
                
                ctx.font = `${bubble.fontSize}px ${getComputedStyle(document.body).getPropertyValue('--font-primary')}`;
                ctx.fillStyle = `rgba(${parseInt(getComputedStyle(document.documentElement).getPropertyValue('--accent-color').slice(1,3), 16)}, ${parseInt(getComputedStyle(document.documentElement).getPropertyValue('--accent-color').slice(3,5), 16)}, ${parseInt(getComputedStyle(document.documentElement).getPropertyValue('--accent-color').slice(5,7), 16)}, ${bubble.opacity})`; // Use accent color
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(bubble.character, bubble.x, bubble.y);
            }
        }

        function animate() {
            drawBubbles();
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', initializeBubbles);
        initializeBubbles();
        animate();
    </script>
</body>
</html>
