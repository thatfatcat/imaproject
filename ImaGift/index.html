<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="3600">
    <title>Animation 34</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&family=Xanh+Mono:ital@0;1&display=swap');
        :root {
            --background-color: #000000;
            --main-text-color: #f0f0f0;
            --accent-color: #ffffff;
            --secondary-text-color: #cccccc;
            --font-primary: 'Xanh Mono', 'Courier New', monospace;
            --font-display: 'VT323', monospace;
        }
        body, html {
            height: 100%; margin: 0; padding: 0; background-color: var(--background-color);
            color: var(--main-text-color); font-family: var(--font-primary); font-size: 16px;
            overflow: hidden;
        }
        #worms-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        .container, footer {
            position: relative;
            z-index: 1;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 4vw;
            min-height: 90vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        h1 {
            font-family: var(--font-display);
            font-size: 3rem;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: normal;
            margin-bottom: 1.5rem;
            text-shadow: 0 0 10px var(--accent-color);
        }
        p {
            margin-bottom: 1.5rem;
            width: 100%;
            max-width: 600px;
        }
        footer {
            text-align: center;
            padding: 2rem 0;
            font-size: 0.9rem;
            color: var(--secondary-text-color);
            margin-top: auto;
            width: 100%;
        }
    </style>
</head>
<body>
    <canvas id="worms-canvas"></canvas>
    <div class="container">
        <h1>[message_of_the_day]</h1>
        <p>The dentist said I have no cavities :) I've been feeling kind of meh but realized I have not been taking my stomach meds consistently. Hopefully that helps. I want to get the invisalign for my teeth, they said they'd be straight in a couple of months.&nbsp;</p>
    </div>
    <footer><p>

    <script>
        const canvas = document.getElementById('worms-canvas');
        const ctx = canvas.getContext('2d');

        let worms = [];
        const numWorms = 10;

        function setup() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            worms = [];
            for (let i = 0; i < numWorms; i++) {
                worms.push(new Worm());
            }
        }

        class Worm {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.angle = Math.random() * Math.PI * 2;
                this.speed = Math.random() * 2 + 1;
                this.color = `hsl(${Math.random() * 360}, 100%, 70%)`;
                this.char = '#';
                this.fontSize = 15;
            }

            move() {
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;

                // Randomly change direction
                if (Math.random() < 0.1) {
                    this.angle += Math.random() * 0.5 - 0.25;
                }

                // Bounce off walls
                if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
                    this.angle += Math.PI;
                }
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.font = `${this.fontSize}px ${getComputedStyle(document.body).getPropertyValue('--font-primary')}`;
                ctx.fillText(this.char, this.x, this.y);
            }
        }

        function animate() {
            // Fading trail effect
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            worms.forEach(worm => {
                worm.move();
                worm.draw();
            });

            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', setup);
        setup();
        animate();
    </script>
</body>
</html>
