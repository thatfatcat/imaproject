<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="3600">
    <title>Animation 36</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&family=Xanh+Mono:ital@0;1&display=swap');
        :root {
            --background-color: #000000;
            --main-text-color: #f0f0f0;
            --accent-color: #00ff00; /* Default green for Matrix-like */
            --secondary-text-color: #aaccaa;
            --font-primary: 'Xanh Mono', 'Courier New', monospace;
            --font-display: 'VT323', monospace;
        }
        body, html {
            height: 100%; margin: 0; padding: 0; background-color: var(--background-color);
            color: var(--main-text-color); font-family: var(--font-primary); font-size: 16px;
            overflow: hidden;
        }
        #digital-rain-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        .container, footer {
            position: relative;
            z-index: 1;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 4vw;
            min-height: 90vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        h1 {
            font-family: var(--font-display);
            font-size: 3rem;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: normal;
            margin-bottom: 1.5rem;
            text-shadow: 0 0 10px var(--accent-color);
        }
        p {
            margin-bottom: 1.5rem;
            width: 100%;
            max-width: 600px;
        }
        footer {
            text-align: center;
            padding: 2rem 0;
            font-size: 0.9rem;
            color: var(--secondary-text-color);
            margin-top: auto;
            width: 100%;
        }
    </style>
</head>
<body>
    <canvas id="digital-rain-canvas"></canvas>
    <div class="container">
        <h1>[Message_of_the_day]</h1>
        <p>Feeling a weird mix of loneliness and need for alone time. I saw Kaeden today for the first time in 3-4 months. It was nice. Cuddling Thorfinn to sleep right now.</p>
    </div>
    <footer><p>

    <script>
        const canvas = document.getElementById('digital-rain-canvas');
        const ctx = canvas.getContext('2d');

        let fontSize = 16;
        let columns;
        let drops = [];
        let frameCount = 0;
        
        const characters = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ1234567890!@#$%^&*()_+-=[]{}|;:",.<>?/`~';

        function initializeRain() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            columns = Math.floor(canvas.width / fontSize);
            drops = [];
            for (let i = 0; i < columns; i++) {
                drops[i] = Math.random() * canvas.height / fontSize; // Start drops at random y positions
            }
        }

        function drawRain() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.font = fontSize + 'px ' + getComputedStyle(document.body).getPropertyValue('--font-primary');
            ctx.textAlign = 'center';

            const accentColor = getComputedStyle(document.documentElement).getPropertyValue('--accent-color').trim();

            for (let i = 0; i < drops.length; i++) {
                const text = characters.charAt(Math.floor(Math.random() * characters.length));
                
                // Fixed green color
                ctx.fillStyle = accentColor;

                // Glowing effect
                ctx.shadowColor = accentColor;
                ctx.shadowBlur = 10;

                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                
                drops[i]+=1; // Increased speed for dynamic rain

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
            }
            frameCount++;
        }

        function animate() {
            drawRain();
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', initializeRain);
        initializeRain();
        animate();
    </script>
</body>
</html>
