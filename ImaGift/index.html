<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="3600">
    <title>Animation 11</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&family=Xanh+Mono:ital@0;1&display=swap');
        :root {
            --background-color: #000000;
            --main-text-color: #ecf0f1;
            --accent-color: #e67e22; /* Orange */
            --secondary-text-color: #f39c12;
            --font-primary: 'Xanh Mono', 'Courier New', monospace;
            --font-display: 'VT323', monospace;
        }
        body, html {
            height: 100%; margin: 0; padding: 0; background-color: var(--background-color);
            color: var(--main-text-color); font-family: var(--font-primary); font-size: 16px;
            overflow: hidden;
        }
        #leaves-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        .container, footer {
            position: relative;
            z-index: 1;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 4vw;
            min-height: 90vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        h1 {
            font-family: var(--font-display);
            font-size: 3rem;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: normal;
            margin-bottom: 1.5rem;
            text-shadow: 0 0 10px var(--accent-color);
        }
        p {
            margin-bottom: 1.5rem;
            width: 100%;
            max-width: 600px;
        }
        footer {
            text-align: center;
            padding: 2rem 0;
            font-size: 0.9rem;
            color: var(--secondary-text-color);
            margin-top: auto;
            width: 100%;
        }
    </style>
</head>
<body>
    <canvas id="leaves-canvas"></canvas>
    <div class="container">
        <h1>[Message_of_the_day]</h1>
        <p>This coming week will have no bosses. Going to take time to try things that they wouldn't let me do otherwise.&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;&nbsp;</p>
    </div>
    <footer><p>

    <script>
        const canvas = document.getElementById('leaves-canvas');
        const ctx = canvas.getContext('2d');

        let leaves = [];
        const numLeaves = 50;
        const leafCharacters = ['*', 'o', 'O', '.', '+', '`'];

        function initializeLeaves() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            leaves = [];
            for (let i = 0; i < numLeaves; i++) {
                leaves.push(createLeaf());
            }
        }

        function createLeaf() {
            return {
                x: Math.random() * canvas.width,
                y: -Math.random() * canvas.height,
                size: Math.random() * 15 + 10,
                speed: Math.random() * 2 + 1,
                wind: Math.random() * 2 - 1,
                rotation: Math.random() * 360,
                rotationSpeed: Math.random() * 0.1 - 0.05,
                color: `hsl(${Math.random() * 60 + 15}, 70%, 50%)`,
                character: leafCharacters[Math.floor(Math.random() * leafCharacters.length)]
            };
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let i = leaves.length - 1; i >= 0; i--) {
                const leaf = leaves[i];
                leaf.y += leaf.speed;
                leaf.x += leaf.wind;
                leaf.rotation += leaf.rotationSpeed;

                if (leaf.y > canvas.height || leaf.x < -leaf.size || leaf.x > canvas.width + leaf.size) {
                    leaves[i] = createLeaf();
                }

                ctx.save();
                ctx.translate(leaf.x, leaf.y);
                ctx.rotate(leaf.rotation * Math.PI / 180);
                
                ctx.fillStyle = leaf.color;
                ctx.font = `${leaf.size}px ${getComputedStyle(document.body).getPropertyValue('--font-primary')}`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(leaf.character, 0, 0);
                
                ctx.restore();
            }
        }

        function animate() {
            draw();
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', initializeLeaves);
        initializeLeaves();
        animate();
    </script>
</body>
</html>
