<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="3600">
    <title>Animation 17</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&family=Xanh+Mono:ital@0;1&display=swap');
        :root {
            --background-color: #000000;
            --main-text-color: #ffcccc; /* Light pink */
            --accent-color: #ff69b4; /* Hot pink */
            --secondary-text-color: #ff99cc; /* Medium pink */
            --font-primary: 'Xanh Mono', 'Courier New', monospace;
            --font-display: 'VT323', monospace;
        }
        body, html {
            height: 100%; margin: 0; padding: 0; background-color: var(--background-color);
            color: var(--main-text-color); font-family: var(--font-primary); font-size: 16px;
            overflow: hidden;
        }
        #wave-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        .container, footer {
            position: relative;
            z-index: 1;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 4vw;
            min-height: 90vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        h1 {
            font-family: var(--font-display);
            font-size: 3rem;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: normal;
            margin-bottom: 1.5rem;
            text-shadow: 0 0 10px var(--accent-color);
        }
        p {
            margin-bottom: 1.5rem;
            width: 100%;
            max-width: 600px;
        }
        footer {
            text-align: center;
            padding: 2rem 0;
            font-size: 0.9rem;
            color: var(--secondary-text-color);
            margin-top: auto;
            width: 100%;
        }
    </style>
</head>
<body>
    <canvas id="wave-canvas"></canvas>
    <div class="container">
        <h1>[Message_Of_The_day]</h1>
        <p>Spending valentines day tomorrow with my friends. Trying to give myself some love for the holiday too. I hope you guys have a great day together! Do something nice&nbsp; &nbsp; &nbsp; &nbsp;</p>
    </div>
    <footer><p>

    <script>
        const canvas = document.getElementById('wave-canvas');
        const ctx = canvas.getContext('2d');

        let waves = [];
        const numWaves = 7;
        const waveChars = ['~', '-', '_', '=', '.', '/', '\\', '|', '+', '*', ':', ';', '`', '\'', '"', '^', '>', '<', '(', ')', '[', ']', '{', '}', '!', '?', '@', '#', '$', '%', '&'];

        function initializeWaves() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            waves = [];
            for (let i = 0; i < numWaves; i++) {
                waves.push(createWave(i));
            }
        }

        function createWave(index) {
            return {
                y: (canvas.height / numWaves) * index + (Math.random() * 50 - 25),
                amplitude: Math.random() * 40 + 10,
                frequency: Math.random() * 0.03 + 0.01,
                speed: Math.random() * 0.03 + 0.01,
                offset: Math.random() * 100,
                character: waveChars[Math.floor(Math.random() * waveChars.length)],
                fontSize: Math.random() * 10 + 10, // Vary font size
                color: `hsla(${Math.random() * 60 + 300}, 100%, ${Math.random() * 50 + 50}%, ${Math.random() * 0.5 + 0.3})`
            };
        }

        let time = 0;

        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            waves.forEach(wave => {
                ctx.fillStyle = wave.color;
                ctx.font = `${wave.fontSize}px ${getComputedStyle(document.body).getPropertyValue('--font-primary')}`;

                for (let x = 0; x < canvas.width; x += wave.fontSize / 2) { // Adjust step based on font size
                    const y = wave.amplitude * Math.sin(x * wave.frequency + time * wave.speed + wave.offset) + wave.y;
                    ctx.fillText(wave.character, x, y);
                }
            });

            time++;
        }

        function animate() {
            draw();
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', initializeWaves);
        initializeWaves();
        animate();
    </script>
</body>
</html>
