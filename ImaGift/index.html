<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="3600">
    <title>Nature's Descent</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&family=Xanh+Mono:ital@0;1&display=swap');
        :root {
            --background-color: #020305;
            --main-text-color: #b0c4de;
            --accent-color: #3d8bff;
            --secondary-text-color: #6a7380;
            --scanline-opacity: 0.05;
            --noise-opacity: 0.03;
            --font-primary: 'Xanh Mono', 'Courier New', monospace;
            --font-display: 'VT323', monospace;
        }
        body, html {
            height: 100%; margin: 0; padding: 0; background-color: var(--background-color);
            color: var(--main-text-color); font-family: var(--font-primary); font-size: 16px;
            line-height: 1.7; overflow: hidden;
            background-image:
                radial-gradient(ellipse at center, rgba(176, 196, 222, 0.03), transparent 80%),
                repeating-linear-gradient(0deg, transparent, transparent 1px, rgba(255, 255, 255, var(--scanline-opacity)) 1px, rgba(255, 255, 255, var(--scanline-opacity)) 2px);
            animation: noise 1s steps(2) infinite;
        }
        @keyframes noise {
            0%, 100% { background-position: 0 0, 0 0; }
            50% { background-position: 50% 50%, 10px 10px; }
        }
        #leaves-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
        .container, footer { position: relative; z-index: 1; }
        .container { max-width: 800px; margin: 0 auto; padding: 4vw; min-height: 90vh; display: flex; flex-direction: column; justify-content: flex-start; align-items: flex-start; }
        h1 { font-family: var(--font-display); font-size: 2.5rem; color: var(--accent-color); text-transform: uppercase; margin: 0 0 2rem 0; letter-spacing: 2px; font-weight: normal; border-bottom: 1px solid var(--secondary-text-color); padding-bottom: 0.5rem; align-self: stretch; }
        p { margin-bottom: 1.5rem; width: 100%; }
        footer { text-align: center; padding: 2rem 0; font-size: 0.9rem; color: var(--secondary-text-color); margin-top: auto; width: 100%; }
        @media (max-width: 768px) { h1 { font-size: 2rem; } }
    </style>
</head>
<body>
    <canvas id="leaves-canvas"></canvas>
    <div class="container">
        <h1>[message_of_the_day]</h1>
        <p>Today I checked on my counter strike inventory, and my skins have slowly gone up in price. My inventory was valued $200 when I last checked. It is now over $1000. I should sell it but honestly am wondering if it's just a good investment to let it keep growing.</p>
    </div>
    <footer></footer>
    <script>
        const canvas = document.getElementById('leaves-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const leaves = [];
        const numLeaves = 50;

        class Leaf {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 5 + 5; // Size between 5 and 10
                this.speed = Math.random() * 1 + 0.5; // Vertical speed
                this.wind = (Math.random() - 0.5) * 0.5; // Horizontal sway
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.1;
                this.color = `hsl(${Math.random() * 60 + 10}, 70%, 50%)`; // Shades of yellow, orange, red
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.fillStyle = this.color;
                ctx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size * 0.6); // Simple rectangular leaf
                ctx.restore();
            }

            update() {
                this.x += this.wind;
                this.y += this.speed;
                this.rotation += this.rotationSpeed;

                if (this.y > canvas.height) {
                    this.y = -this.size; // Reset to top
                    this.x = Math.random() * canvas.width; // New random x
                    this.speed = Math.random() * 1 + 0.5;
                    this.wind = (Math.random() - 0.5) * 0.5;
                }
            }
        }

        function init() {
            leaves.length = 0;
            for (let i = 0; i < numLeaves; i++) {
                leaves.push(new Leaf());
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(2, 3, 5, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            leaves.forEach(leaf => {
                leaf.update();
                leaf.draw();
            });

            requestAnimationFrame(animate);
        }

        init();
        animate();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            init();
        });
    </script>
</body>
</html>
