<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="3600">
    <title>Animation 20</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&family=Xanh+Mono:ital@0;1&display=swap');
        :root {
            --background-color: #000000;
            --main-text-color: #f0f0f0;
            --accent-color: #ffffff;
            --secondary-text-color: #cccccc;
            --font-primary: 'Xanh Mono', 'Courier New', monospace;
            --font-display: 'VT323', monospace;
        }
        body, html {
            height: 100%; margin: 0; padding: 0; background-color: var(--background-color);
            color: var(--main-text-color); font-family: var(--font-primary); font-size: 16px;
            overflow: hidden;
        }
        #tunnel-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        .container, footer {
            position: relative;
            z-index: 1;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 4vw;
            min-height: 90vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        h1 {
            font-family: var(--font-display);
            font-size: 3rem;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: normal;
            margin-bottom: 1.5rem;
            text-shadow: 0 0 10px var(--accent-color);
        }
        p {
            margin-bottom: 1.5rem;
            width: 100%;
            max-width: 600px;
        }
        footer {
            text-align: center;
            padding: 2rem 0;
            font-size: 0.9rem;
            color: var(--secondary-text-color);
            margin-top: auto;
            width: 100%;
        }
    </style>
</head>
<body>
    <canvas id="tunnel-canvas"></canvas>
    <div class="container">
        <h1>[Message_of_the_day]</h1>
        <p>After a long break due to the stalking I was experiencing, I've decided to finally come back to social media. Not sure if to post about the situation or not.</p>
    </div>
    <footer><p>

    <script>
        const canvas = document.getElementById('tunnel-canvas');
        const ctx = canvas.getContext('2d');

        let stars = [];
        const numStars = 800; // Increased star count for a fuller effect
        let centerX, centerY, maxRadius;

        function initializeStars() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            centerX = canvas.width / 2;
            centerY = canvas.height / 2;
            maxRadius = Math.sqrt(centerX * centerX + centerY * centerY);
            stars = [];
            for (let i = 0; i < numStars; i++) {
                stars.push(createStar());
            }
        }

        function createStar() {
            return {
                angle: Math.random() * Math.PI * 2,
                radius: Math.random() * 2, // Start near the center
                speed: Math.random() * 2 + 1
            };
        }

        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)'; // Fading effect
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            stars.forEach(star => {
                // Update star position
                star.radius += star.speed;

                if (star.radius >= maxRadius) {
                    // Reset star
                    star.radius = 0;
                    star.speed = Math.random() * 2 + 1;
                }

                const progress = star.radius / maxRadius;
                const x = centerX + Math.cos(star.angle) * star.radius;
                const y = centerY + Math.sin(star.angle) * star.radius;

                // Calculate previous position for the trail
                const prevRadius = Math.max(0, star.radius - (star.speed * 5)); // Trail length based on speed
                const prevX = centerX + Math.cos(star.angle) * prevRadius;
                const prevY = centerY + Math.sin(star.angle) * prevRadius;
                
                // Draw the streak
                ctx.beginPath();
                ctx.moveTo(prevX, prevY);
                ctx.lineTo(x, y);
                ctx.lineWidth = 1 + progress * 2.5; // Line gets thicker as it moves out
                ctx.strokeStyle = `rgba(255, 255, 255, ${progress})`; // Line fades in
                ctx.stroke();
            });
        }

        function animate() {
            draw();
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', initializeStars);
        initializeStars();
        animate();
    </script>
</body>
</html>
