<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="3600">
    <title>Animation 31</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&family=Xanh+Mono:ital@0;1&display=swap');
        :root {
            --background-color: #000000;
            --main-text-color: #77aaff;
            --accent-color: #808080; /* Cool blue */
            --secondary-text-color: #88dddd;
            --font-primary: 'Xanh Mono', 'Courier New', monospace;
            --font-display: 'VT323', monospace;
        }
        body, html {
            height: 100%; margin: 0; padding: 0; background-color: var(--background-color);
            color: var(--main-text-color); font-family: var(--font-primary); font-size: 16px;
            overflow: hidden;
        }
        #maze-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        .container, footer {
            position: relative;
            z-index: 1;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 4vw;
            min-height: 90vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        h1 {
            font-family: var(--font-display);
            font-size: 3rem;
            color: var(77aaff);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: normal;
            margin-bottom: 1.5rem;
            text-shadow: 0 0 10px var(--accent-color);
        }
        p {
            margin-bottom: 1.5rem;
            width: 100%;
            max-width: 600px;
            font-size: 1.5rem;
        }
        footer {
            text-align: center;
            padding: 2rem 0;
            font-size: 0.9rem;
            color: var(--secondary-text-color);
            margin-top: auto;
            width: 100%;
        }
    </style>
</head>
<body>
    <canvas id="maze-canvas"></canvas>
    <div class="container">
        <h1>[Message_of_the_day]</h1>
        <p>Today I went longboarding with Sophie on the legacy trail, and talked to safta. I want to visit Israel soon. I miss it so much. Also, I looked how much people with my job get paid in Switzerland. It's about triple the amount of how much I get here. Food for thought.</p>
    </div>
    <footer><p>

    <script>
        const canvas = document.getElementById('maze-canvas');
        const ctx = canvas.getContext('2d');

        const resolution = 10;
        let cols, rows;
        let grid;
        let current;
        let stack = [];
        
        function setup() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            cols = Math.floor(canvas.width / resolution);
            rows = Math.floor(canvas.height / resolution);
            grid = new Array(cols).fill(null).map(() => new Array(rows).fill(null).map(() => new Cell()));
            
            // Start the maze generation
            current = grid[0][0];
            current.visited = true;
            stack.push(current);
        }

        class Cell {
            constructor() {
                this.walls = [true, true, true, true]; // Top, Right, Bottom, Left
                this.visited = false;
            }
        }

        function draw() {
            ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--background-color');
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--accent-color');
            ctx.lineWidth = 2;

            for (let i = 0; i < cols; i++) {
                for (let j = 0; j < rows; j++) {
                    const x = i * resolution;
                    const y = j * resolution;
                    const cell = grid[i][j];

                    if (cell.walls[0]) ctx.strokeRect(x, y, resolution, 0); // Top
                    if (cell.walls[1]) ctx.strokeRect(x + resolution, y, 0, resolution); // Right
                    if (cell.walls[2]) ctx.strokeRect(x, y + resolution, resolution, 0); // Bottom
                    if (cell.walls[3]) ctx.strokeRect(x, y, 0, resolution); // Left
                }
            }
            
            // Highlight the current cell
            ctx.fillStyle = 'rgba(255, 0, 255, 0.5)';
            ctx.fillRect(current.i * resolution, current.j * resolution, resolution, resolution);
            
            // Maze generation step
            const next = checkNeighbors(current.i, current.j);
            if(next){
                next.visited = true;
                stack.push(current);
                removeWalls(current, next);
                current = next;
            } else if (stack.length > 0) {
                current = stack.pop();
            } else {
                 // Maze is complete, restart
                 setTimeout(setup, 2000);
                 return; // Stop this animation loop
            }
        }

        function checkNeighbors(i, j) {
            let neighbors = [];
            const top    = grid[i]?.[j - 1];
            const right  = grid[i + 1]?.[j];
            const bottom = grid[i]?.[j + 1];
            const left   = grid[i - 1]?.[j];

            if (top && !top.visited) neighbors.push({cell: top, i: i, j: j - 1});
            if (right && !right.visited) neighbors.push({cell: right, i: i + 1, j: j});
            if (bottom && !bottom.visited) neighbors.push({cell: bottom, i: i, j: j + 1});
            if (left && !left.visited) neighbors.push({cell: left, i: i - 1, j: j});

            if (neighbors.length > 0) {
                const r = Math.floor(Math.random() * neighbors.length);
                grid[neighbors[r].i][neighbors[r].j].i = neighbors[r].i;
                grid[neighbors[r].i][neighbors[r].j].j = neighbors[r].j;
                return grid[neighbors[r].i][neighbors[r].j];
            } else {
                return undefined;
            }
        }
        
        function removeWalls(a, b){
             const x = a.i - b.i;
             if(x === 1) { a.walls[3] = false; b.walls[1] = false;}
             else if (x === -1) { a.walls[1] = false; b.walls[3] = false; }
             const y = a.j - b.j;
             if(y === 1) { a.walls[0] = false; b.walls[2] = false; }
             else if (y === -1) { a.walls[2] = false; b.walls[0] = false; }
        }

        function animate() {
            draw();
            requestAnimationFrame(animate);
        }
        
        // Give each cell its index
        function assignIndices(){
             for (let i = 0; i < cols; i++) {
                for (let j = 0; j < rows; j++) {
                    grid[i][j].i = i;
                    grid[i][j].j = j;
                }
            }
        }

        window.addEventListener('resize', ()=>{
            setup();
            assignIndices();
        });
        
        setup();
        assignIndices();
        animate();

    </script>
</body>
</html>
