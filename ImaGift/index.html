<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="3600">
    <title>Idle Thoughts</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&family=Xanh+Mono:ital@0;1&display=swap');
        :root {
            --background-color: #1a1a2e;
            --main-text-color: #dcdcdc;
            --accent-color: #fca311;
            --secondary-text-color: #8f8f9d;
            --symbol-color: #fca311;
            --font-primary: 'Xanh Mono', 'Courier New', monospace;
            --font-display: 'VT323', monospace;
        }
        body, html {
            height: 100%; margin: 0; padding: 0; background-color: var(--background-color);
            color: var(--main-text-color); font-family: var(--font-primary); font-size: 16px;
            line-height: 1.6; overflow: hidden;
        }
        #bouncer-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
        .container, footer { position: relative; z-index: 1; }
        .container { max-width: 750px; margin: 0 auto; padding: 5vw; min-height: 90vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        h1 { font-family: var(--font-display); font-size: 2.4rem; color: var(--accent-color); text-transform: uppercase; margin: 0 0 1.5rem 0; letter-spacing: 2px; font-weight: normal; }
        p { margin-bottom: 1.5rem; width: 100%; }
        footer { text-align: center; padding: 2rem 0; font-size: 0.9rem; color: var(--secondary-text-color); margin-top: auto; width: 100%; }
        @media (max-width: 768px) { h1 { font-size: 2rem; } }
    </style>
</head>
<body>
    <canvas id="bouncer-canvas"></canvas>
    <div class="container">
        <h1>[Message_of_the_day]</h1>
        <p>I'm very excited for you guys to be here. It's my main driver right now to think about. I had a bad day today but I'll push through. I wish I liked myself more consistently.</p>
    </div>
    <footer></footer>
    <script>
        const canvas = document.getElementById('bouncer-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const symbol = ':)';
        const fontSize = 30;
        let x = 100;
        let y = 100;
        let dx = 2;
        let dy = 2;
        let hue = 0;

        function draw() {
            ctx.fillStyle = 'rgba(26, 26, 46, 0.25)'; // Fading effect
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.font = fontSize + 'px ' + getComputedStyle(document.body).getPropertyValue('--font-display');
            
            // Change color over time
            const symbolColor = `hsl(${hue}, 100%, 70%)`;
            ctx.fillStyle = symbolColor;
            
            ctx.fillText(symbol, x, y);

            x += dx;
            y += dy;

            // Bounce off walls
            if (x + ctx.measureText(symbol).width >= canvas.width || x <= 0) {
                dx = -dx;
                hue = (hue + 45) % 360; // Change color on bounce
            }
            if (y >= canvas.height || y - fontSize <= 0) {
                dy = -dy;
                hue = (hue + 45) % 360; // Change color on bounce
            }
        }

        function animate() {
            draw();
            requestAnimationFrame(animate);
        }

        animate();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
