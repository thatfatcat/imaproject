<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="3600"> <!-- Refresh every hour -->
    <title>Falling Digits - Animation 81</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&family=Xanh+Mono:ital@0;1&display=swap');
        :root {
            --background-color: #000000;
            --main-text-color: #b0c4de;
            --accent-color: #3d8bff;
            --secondary-text-color: #6a7380;
            --scanline-opacity: 0.05;
            --noise-opacity: 0.03;
            --font-primary: 'Xanh Mono', 'Courier New', monospace;
            --font-display: 'VT323', monospace;
        }
        body, html {
            height: 100%; margin: 0; padding: 0; background-color: var(--background-color);
            color: var(--main-text-color); font-family: var(--font-primary); font-size: 16px;
            line-height: 1.7; overflow: hidden;
            /* No background-image or animation: noise to ensure clean black background */
        }
        #animation-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
        .container, footer { position: relative; z-index: 1; }
        .container { max-width: 800px; margin: 0 auto; padding: 4vw; min-height: 90vh; display: flex; flex-direction: column; justify-content: flex-start; align-items: flex-start; }
        h1 { font-family: var(--font-display); font-size: 2.5rem; color: var(--accent-color); text-transform: uppercase; margin: 0 0 2rem 0; letter-spacing: 2px; font-weight: normal; border-bottom: 1px solid var(--secondary-text-color); padding-bottom: 0.5rem; align-self: stretch; }
        p { margin-bottom: 1.5rem; width: 100%; }
        footer { text-align: center; padding: 2rem 0; font-size: 0.9rem; color: var(--secondary-text-color); margin-top: auto; width: 100%; }
        @media (max-width: 768px) { h1 { font-size: 2rem; } }
    </style>
</head>
<body>
    <canvas id="animation-canvas"></canvas>
    <div class="container">
        <h1>[message_of_the_day]</h1>
        <p>It's funny how different things affect people differently. The ramen spilling on my desk yesterday is in the top 10 worst things that have ever happened to me and I'm not even kidding. I'm so lucky to have my life, where I can say that. I hope I'm not wasting it.</p>
    </div>
    <footer><p>
    <script>
        const canvas = document.getElementById('animation-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const characters = '0123456789ABCDEF'; // Hexadecimal characters for a digital feel
        const fontSize = 16;
        let cols = Math.floor(canvas.width / fontSize);
        const drops = []; // Stores the y-position of each falling character in a column

        // Initialize drops to start at random positions at the top
        for (let i = 0; i < cols; i++) {
            drops[i] = Math.random() * canvas.height;
        }

        function getRandomChar() {
            return characters[Math.floor(Math.random() * characters.length)];
        }

        function drawFallingCharacters() {
            ctx.fillStyle = '#000000'; // Pure black background
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.font = `${fontSize}px var(--font-display)`;
            ctx.fillStyle = '#00FF00'; // Bright green for clear visibility

            for (let i = 0; i < drops.length; i++) {
                const char = getRandomChar();
                const x = i * fontSize;
                const y = drops[i];

                ctx.fillText(char, x, y);

                // Move character down
                drops[i] += fontSize; // Move by one character height

                // If character is off-screen, reset to top at a random x
                if (drops[i] > canvas.height && Math.random() > 0.95) { // Add a little randomness to when it resets
                    drops[i] = 0;
                }
            }
        }

        function animate() {
            drawFallingCharacters();
            requestAnimationFrame(animate);
        }
        
        animate();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            cols = Math.floor(canvas.width / fontSize);
            // Re-initialize drops for new width
            drops.length = 0;
            for (let i = 0; i < cols; i++) {
                drops[i] = Math.random() * canvas.height;
            }
        });
    </script>
</body>
</html>
