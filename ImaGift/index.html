<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="3600">
    <title>Animation 23</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&family=Xanh+Mono:ital@0;1&display=swap');
        :root {
            --background-color: #000000;
            --main-text-color: #f0f0f0;
            --accent-color: #4a90e2; /* Cool blue */
            --secondary-text-color: #88dddd;
            --font-primary: 'Xanh Mono', 'Courier New', monospace;
            --font-display: 'VT323', monospace;
        }
        body, html {
            height: 100%; margin: 0; padding: 0; background-color: var(--background-color);
            color: var(--main-text-color); font-family: var(--font-primary); font-size: 16px;
            overflow: hidden;
        }
        #morph-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        .container, footer {
            position: relative;
            z-index: 1;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 4vw;
            min-height: 90vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        h1 {
            font-family: var(--font-display);
            font-size: 3rem;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: normal;
            margin-bottom: 1.5rem;
            text-shadow: 0 0 10px var(--accent-color);
        }
        p {
            margin-bottom: 1.5rem;
            width: 100%;
            max-width: 600px;
        }
        footer {
            text-align: center;
            padding: 2rem 0;
            font-size: 0.9rem;
            color: var(--secondary-text-color);
            margin-top: auto;
            width: 100%;
        }
    </style>
</head>
<body>
    <canvas id="morph-canvas"></canvas>
    <div class="container">
        <h1>[Message_of_the_day]</h1>
        <p>I finished my app. I can send you a video of it in action if you want to see :). Also as im writing thisI noticed something: Billie is super active today and her head is straighter than usual! I think she might be winning!</p>
    </div>
    <footer><p>

    <script>
        const canvas = document.getElementById('morph-canvas');
        const ctx = canvas.getContext('2d');
        
        let points = [];
        let currentShapeIndex = 0;
        let morphProgress = 0;
        const morphSpeed = 0.005;
        const holdDuration = 200; // aribtrary amount of 'frames'
        let holdCounter = holdDuration;

        const shapes = {
            // Heart
            heart: [
                {x:0,y:-0.3},{x:0.2,y:-0.5},{x:0.4,y:-0.4},{x:0.5,y:-0.2},{x:0.5,y:0},{x:0,y:0.5},
                {x:-0.5,y:0},{x:-0.5,y:-0.2},{x:-0.4,y:-0.4},{x:-0.2,y:-0.5}
            ],
            // Star
            star: [
                {x:0,y:-0.5},{x:0.1,y:-0.2},{x:0.4,y:-0.2},{x:0.2,y:0},{x:0.3,y:0.3},{x:0,y:0.1},
                {x:-0.3,y:0.3},{x:-0.2,y:0},{x:-0.4,y:-0.2},{x:-0.1,y:-0.2}
            ],
             // Box
            box: [
                {x:-0.5,y:-0.5},{x:0.5,y:-0.5},{x:0.5,y:0.5},{x:-0.5,y:0.5}
            ]
        };

        const shapeKeys = Object.keys(shapes);

        // Normalize shapes to have the same number of points
        const maxPoints = Math.max(...shapeKeys.map(key => shapes[key].length));
        shapeKeys.forEach(key => {
            const shape = shapes[key];
            while (shape.length < maxPoints) {
                shape.push({...shape[Math.floor(Math.random() * shape.length)]}); // Duplicate random points
            }
        });

        function lerp(a, b, t) {
            return a + (b - a) * t;
        }

        function setup() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            points = shapes[shapeKeys[currentShapeIndex]].map(p => ({...p})); // Initial points
        }
        
        function draw() {
            ctx.fillStyle = 'rgba(0,0,0,0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const fromShape = shapes[shapeKeys[currentShapeIndex]];
            const toShape = shapes[shapeKeys[(currentShapeIndex + 1) % shapeKeys.length]];
            
            if(holdCounter > 0){
                holdCounter--;
            } else {
                 morphProgress += morphSpeed;
            }
           

            if (morphProgress >= 1) {
                morphProgress = 0;
                holdCounter = holdDuration;
                currentShapeIndex = (currentShapeIndex + 1) % shapeKeys.length;
            }
            
            ctx.font = '40px ' + getComputedStyle(document.body).getPropertyValue('--font-primary');
            ctx.textAlign = 'center';

            for (let i = 0; i < maxPoints; i++) {
                const hue = (time + i * 3) % 360;
                ctx.fillStyle = `hsl(${hue}, 100%, 70%)`;
                
                const p1 = fromShape[i];
                const p2 = toShape[i];

                const x = lerp(p1.x, p2.x, morphProgress);
                const y = lerp(p1.y, p2.y, morphProgress);
                
                const canvasX = x * (canvas.height / 2) + canvas.width / 2;
                const canvasY = y * (canvas.height / 2) + canvas.height / 2;

                ctx.fillText('*', canvasX, canvasY);
            }
        }
        
        let time = 0;

        function animate() {
            time++;
            draw();
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', setup);
        setup();
        animate();

    </script>
</body>
</html>
