<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="3600">
    <title>Animation 32</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&family=Xanh+Mono:ital@0;1&display=swap');
        :root {
            --background-color: #000000;
            --main-text-color: #f0f0f0;
            --accent-color: #ffffff; /* Initial color, will be changed by JS */
            --secondary-text-color: #cccccc;
            --font-primary: 'Xanh Mono', 'Courier New', monospace;
            --font-display: 'VT323', monospace;
        }
        body, html {
            height: 100%; margin: 0; padding: 0; background-color: var(--background-color);
            color: var(--main-text-color); font-family: var(--font-primary); font-size: 16px;
            overflow: hidden;
        }
        #bounce-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        .container, footer {
            position: relative;
            z-index: 1;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 4vw;
            min-height: 90vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        h1 {
            font-family: var(--font-display);
            font-size: 3rem;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: normal;
            margin-bottom: 1.5rem;
            text-shadow: 0 0 10px var(--accent-color);
        }
        p {
            margin-bottom: 1.5rem;
            width: 100%;
            max-width: 600px;
        }
        footer {
            text-align: center;
            padding: 2rem 0;
            font-size: 0.9rem;
            color: var(--secondary-text-color);
            margin-top: auto;
            width: 100%;
        }
    </style>
</head>
<body>
    <canvas id="bounce-canvas"></canvas>
    <div class="container">
        <h1>[message_of_the_day]</h1>
        <p>Tomorrow I have a talk with the department director about my future roles and what they want me to learn. I have a suspicion that they want to decelerate my advancement. I think it's a bad talk and I need to be ready to stand my ground while not burning bridges. Wish me luck.&nbsp;</p>
    </div>
    <footer><p>

    <script>
        const canvas = document.getElementById('bounce-canvas');
        const ctx = canvas.getContext('2d');

        let logos = [];
        const numLogos = 5;

        function createLogo() {
            const fontSize = 30;
            ctx.font = `${fontSize}px ${getComputedStyle(document.body).getPropertyValue('--font-primary')}`;
            return {
                text: "[*]",
                x: Math.random() * (canvas.width - 100),
                y: Math.random() * (canvas.height - 50),
                vx: (Math.random() > 0.5 ? 1 : -1) * (Math.random() * 2 + 1),
                vy: (Math.random() > 0.5 ? 1 : -1) * (Math.random() * 2 + 1),
                color: `hsl(${Math.random() * 360}, 100%, 70%)`,
                fontSize: fontSize,
                width: ctx.measureText("[*]").width
            };
        }

        function setup() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            logos = [];
            for(let i = 0; i < numLogos; i++){
                logos.push(createLogo());
            }
        }

        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            logos.forEach(logo => {
                // Update position
                logo.x += logo.vx;
                logo.y += logo.vy;

                // Collision detection
                let hitWall = false;
                if (logo.x + logo.width > canvas.width || logo.x < 0) {
                    logo.vx *= -1;
                    hitWall = true;
                }
                if (logo.y > canvas.height || logo.y - logo.fontSize < 0) {
                    logo.vy *= -1;
                    hitWall = true;
                }

                // Change color on hit
                if (hitWall) {
                    logo.color = `hsl(${Math.random() * 360}, 100%, 70%)`;
                }

                // Draw the logo
                ctx.fillStyle = logo.color;
                ctx.font = `${logo.fontSize}px ${getComputedStyle(document.body).getPropertyValue('--font-primary')}`;
                ctx.fillText(logo.text, logo.x, logo.y);
            });
        }

        function animate() {
            draw();
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', setup);
        setup();
        animate();
    </script>
</body>
</html>
