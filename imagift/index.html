<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="3600">
    <title>Animation 29</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&family=Xanh+Mono:ital@0;1&display=swap');
        :root {
            --background-color: #000000;
            --main-text-color: #f0f0f0;
            --accent-color: #ffff00; /* Yellow for the spotlight */
            --secondary-text-color: #ddddaa;
            --font-primary: 'Xanh Mono', 'Courier New', monospace;
            --font-display: 'VT323', monospace;
        }
        body, html {
            height: 100%; margin: 0; padding: 0; background-color: var(--background-color);
            color: var(--main-text-color); font-family: var(--font-primary); font-size: 16px;
            overflow: hidden;
        }
        #spotlight-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        .container, footer {
            position: relative;
            z-index: 1;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 4vw;
            min-height: 90vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        h1 {
            font-family: var(--font-display);
            font-size: 3rem;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: normal;
            margin-bottom: 1.5rem;
            text-shadow: 0 0 10px var(--accent-color);
        }
        p {
            margin-bottom: 1.5rem;
            width: 100%;
            max-width: 600px;
        }
        footer {
            text-align: center;
            padding: 2rem 0;
            font-size: 0.9rem;
            color: var(--secondary-text-color);
            margin-top: auto;
            width: 100%;
        }
    </style>
</head>
<body>
    <canvas id="spotlight-canvas"></canvas>
    <div class="container">
        <h1>[Message_Of_The_day]</h1>
        <p>Today people were supposed to hang out, but everyone except Stephen cancelld. Him and I went to the grocery store and together cooked a meal of mac n cheese buffalo chicken with chicken caesar salad. I enjoyed the process quite a bit. Maybe I'll start cooking&nbsp; &nbsp;</p>
    </div>
    <footer><p>

    <script>
        const canvas = document.getElementById('spotlight-canvas');
        const ctx = canvas.getContext('2d');

        const resolution = 12;
        const allChars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()[]{}';
        let cols, rows;
        let charGrid;
        let time = 0;

        function make2DArray(cols, rows) {
            let arr = new Array(cols);
            for (let i = 0; i < arr.length; i++) {
                arr[i] = new Array(rows);
            }
            return arr;
        }

        function setup() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            cols = Math.floor(canvas.width / resolution);
            rows = Math.floor(canvas.height / resolution);
            
            charGrid = make2DArray(cols, rows);
            for (let i = 0; i < cols; i++) {
                for (let j = 0; j < rows; j++) {
                    charGrid[i][j] = allChars.charAt(Math.floor(Math.random() * allChars.length));
                }
            }
        }

        function draw() {
            ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--background-color');
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            const spotlight = {
                x: canvas.width / 2 + Math.sin(time * 0.02) * (canvas.width / 3),
                y: canvas.height / 2 + Math.cos(time * 0.03) * (canvas.height / 3),
                radius: 150
            };

            ctx.font = `${resolution}px ${getComputedStyle(document.body).getPropertyValue('--font-primary')}`;

            for (let i = 0; i < cols; i++) {
                for (let j = 0; j < rows; j++) {
                    const charX = i * resolution;
                    const charY = j * resolution;
                    
                    const dx = charX - spotlight.x;
                    const dy = charY - spotlight.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < spotlight.radius) {
                        const opacity = 1 - (distance / spotlight.radius);
                        ctx.fillStyle = `rgba(255, 255, 0, ${opacity})`;
                        ctx.fillText(charGrid[i][j], charX, charY);
                    } else {
                        // Optionally draw dim characters outside the spotlight
                         ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
                         ctx.fillText(charGrid[i][j], charX, charY);
                    }
                }
            }
            time++;
        }

        function animate() {
            draw();
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', setup);
        setup();
        animate();

    </script>
</body>
</html>
