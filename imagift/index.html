<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="3600">
    <title>Animation 33</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&family=Xanh+Mono:ital@0;1&display=swap');
        :root {
            --background-color: #000000;
            --main-text-color: #f0f0f0;
            --accent-color: #8a2be2; /* Blue Violet */
            --secondary-text-color: #9370db; /* Medium Purple */
            --font-primary: 'Xanh Mono', 'Courier New', monospace;
            --font-display: 'VT323', monospace;
        }
        body, html {
            height: 100%; margin: 0; padding: 0; background-color: var(--background-color);
            color: var(--main-text-color); font-family: var(--font-primary); font-size: 16px;
            overflow: hidden;
        }
        #stream-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        .container, footer {
            position: relative;
            z-index: 1;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 4vw;
            min-height: 90vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        h1 {
            font-family: var(--font-display);
            font-size: 3rem;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: normal;
            margin-bottom: 1.5rem;
            text-shadow: 0 0 10px var(--accent-color);
        }
        p {
            margin-bottom: 1.5rem;
            width: 100%;
            max-width: 600px;
        }
        footer {
            text-align: center;
            padding: 2rem 0;
            font-size: 0.9rem;
            color: var(--secondary-text-color);
            margin-top: auto;
            width: 100%;
        }
    </style>
</head>
<body>
    <canvas id="stream-canvas"></canvas>
    <div class="container">
        <h1>[message_of_the_day]</h1>
      <p>Thank you guys for calling yesterday. It meant a lot.&nbsp;</p>
        <p>You guys are the best part of me.&nbsp;</p>
    </div>
    <footer><p>

    <script>
        const canvas = document.getElementById('stream-canvas');
        const ctx = canvas.getContext('2d');

        const resolution = 20;
        let cols, rows;
        let streams = [];
        const allChars = '01'; // Binary theme

        function setup() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            cols = Math.floor(canvas.width / resolution);
            rows = Math.floor(canvas.height / resolution);
            streams = [];
            for (let i = 0; i < cols; i++) {
                streams.push(new Stream(i * resolution));
            }
        }
        
        class Symbol {
            constructor(x, y, speed){
                this.x = x;
                this.y = y;
                this.speed = speed;
                this.value;
                this.switchInterval = Math.round(Math.random() * 20 + 5);
            }
            
            setToRandomSymbol(frameCount){
                 if(frameCount % this.switchInterval == 0){
                    this.value = allChars.charAt(Math.floor(Math.random() * allChars.length));
                 }
            }

            rain(){
                this.y = (this.y >= canvas.height) ? 0 : this.y += this.speed;
            }
        }

        class Stream {
            constructor(x){
                this.x = x;
                this.symbols = [];
                this.totalSymbols = Math.round(Math.random() * 20 + 5);
                this.speed = Math.random() * 5 + 2;
                this.generateSymbols();
            }
            
            generateSymbols(){
                let y = Math.random() * -500;
                for(let i = 0; i <= this.totalSymbols; i++){
                    const symbol = new Symbol(this.x, y, this.speed);
                    this.symbols.push(symbol);
                    y -= resolution;
                }
            }
            
            render(frameCount){
                 this.symbols.forEach(symbol => {
                    const hue = (symbol.y / canvas.height) * 360; // Color changes with position
                    ctx.fillStyle = `hsl(${hue}, 100%, 70%)`;
                    ctx.font = `${resolution}px ${getComputedStyle(document.body).getPropertyValue('--font-primary')}`;
                    ctx.fillText(symbol.value, symbol.x, symbol.y);
                    symbol.rain();
                    symbol.setToRandomSymbol(frameCount);
                 });
            }
        }

        let frameCount = 0;
        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            streams.forEach(stream => stream.render(frameCount));
            frameCount++;
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', setup);
        setup();
        animate();
    </script>
</body>
</html>
