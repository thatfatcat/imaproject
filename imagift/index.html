<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="3600"> <!-- Refresh every hour -->
    <title>Echoing Code - Animation 89</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&family=Xanh+Mono:ital@0;1&display=swap');
        :root {
            --background-color: #000000;
            --main-text-color: #b0c4de;
            --accent-color: #3d8bff;
            --secondary-text-color: #6a7380;
            --scanline-opacity: 0.05;
            --noise-opacity: 0.03;
            --font-primary: 'Xanh Mono', 'Courier New', monospace;
            --font-display: 'VT323', monospace;
        }
        body, html {
            height: 100%; margin: 0; padding: 0; background-color: var(--background-color);
            color: var(--main-text-color); font-family: var(--font-primary); font-size: 16px;
            line-height: 1.7; overflow: hidden;
            /* No background-image or animation: noise to ensure clean black background */
        }
        #animation-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
        .container, footer { position: relative; z-index: 1; }
        .container { max-width: 800px; margin: 0 auto; padding: 4vw; min-height: 90vh; display: flex; flex-direction: column; justify-content: flex-start; align-items: flex-start; }
        h1 { font-family: var(--font-display); font-size: 2.5rem; color: var(--accent-color); text-transform: uppercase; margin: 0 0 2rem 0; letter-spacing: 2px; font-weight: normal; border-bottom: 1px solid var(--secondary-text-color); padding-bottom: 0.5rem; align-self: stretch; }
        p { margin-bottom: 1.5rem; width: 100%; }
        footer { text-align: center; padding: 2rem 0; font-size: 0.9rem; color: var(--secondary-text-color); margin-top: auto; width: 100%; }
        @media (max-width: 768px) { h1 { font-size: 2rem; } }
    </style>
</head>
<body>
    <canvas id="animation-canvas"></canvas>
    <div class="container">
        <h1>[Message_of_the_day]</h1>
        <p>As a method of being better about doing chores im giving myself a point system. Small chores are 1 point and big chores are 2. I need to get 3 points every day.</p>
    </div>
    <footer><p>
    <script>
        const canvas = document.getElementById('animation-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const headChars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()';
        const tailChars = '.-_~;:,';
        const fontSize = 18;
        let cols = Math.floor(canvas.width / fontSize);
        const raindrops = [];
        const maxDrops = 100;
        const spawnRate = 0.8; // Probability of spawning a new drop per frame
        const tailLengthMin = 5;
        const tailLengthMax = 15;
        const dropSpeedMin = 5;
        const dropSpeedMax = 10;
        const headColor = '#00FF00'; // Bright green for head
        const tailColor = '#00CC00'; // Slightly darker green for tail

        class Raindrop {
            constructor(col) {
                this.col = col;
                this.init();
            }

            init() {
                this.x = this.col * fontSize;
                this.y = Math.random() * -canvas.height; // Start off-screen above
                this.speed = Math.random() * (dropSpeedMax - dropSpeedMin) + dropSpeedMin;
                this.headChar = headChars[Math.floor(Math.random() * headChars.length)];
                this.tailLength = Math.floor(Math.random() * (tailLengthMax - tailLengthMin + 1)) + tailLengthMin;
                this.tail = [];
                for (let i = 0; i < this.tailLength; i++) {
                    this.tail.push(tailChars[Math.floor(Math.random() * tailChars.length)]);
                }
            }

            update() {
                this.y += this.speed;

                if (this.y > canvas.height + this.tailLength * fontSize) { // If tail is completely off-screen
                    this.init(); // Reset to top
                }
            }

            draw() {
                // Draw tail
                for (let i = 0; i < this.tail.length; i++) {
                    const tailY = this.y - (i + 1) * fontSize;
                    if (tailY > -fontSize && tailY < canvas.height + fontSize) { // Only draw visible parts of tail
                        const opacity = 1 - (i / this.tail.length);
                        ctx.fillStyle = `rgba(${parseInt(tailColor.slice(1,3), 16)}, ${parseInt(tailColor.slice(3,5), 16)}, ${parseInt(tailColor.slice(5,7), 16)}, ${opacity})`;
                        ctx.fillText(this.tail[i], this.x, tailY);
                    }
                }

                // Draw head
                if (this.y > -fontSize && this.y < canvas.height + fontSize) { // Only draw visible head
                    ctx.fillStyle = headColor;
                    ctx.fillText(this.headChar, this.x, this.y);
                }
            }
        }

        function initDrops() {
            for (let i = 0; i < cols; i++) {
                if (Math.random() < 0.5) { // Initially populate half the columns
                    raindrops.push(new Raindrop(i));
                }
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)'; // Clear with slight transparency for a subtle trail effect
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.font = `${fontSize}px 'VT323'`; // Hardcoded font
            ctx.textAlign = 'left';
            ctx.textBaseline = 'top';

            // Spawn new drops in empty columns
            if (Math.random() < spawnRate) {
                 const colToSpawn = Math.floor(Math.random() * cols);
                 const hasDrop = raindrops.some(drop => drop.col === colToSpawn);
                 if (!hasDrop) {
                     raindrops.push(new Raindrop(colToSpawn));
                 }
            }

            for (let i = raindrops.length - 1; i >= 0; i--) {
                const drop = raindrops[i];
                drop.update();
                drop.draw();
            }

            requestAnimationFrame(animate);
        }
        
        initDrops();
        animate();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            cols = Math.floor(canvas.width / fontSize);
            raindrops.length = 0; // Clear and re-initialize
            initDrops();
        });
    </script>
</body>
</html>
