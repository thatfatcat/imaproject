<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="3600"> <!-- Refresh every hour -->
    <title>Pattern Metamorphosis - Animation 82</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&family=Xanh+Mono:ital@0;1&display=swap');
        :root {
            --background-color: #000000;
            --main-text-color: #b0c4de;
            --accent-color: #3d8bff;
            --secondary-text-color: #6a7380;
            --scanline-opacity: 0.05;
            --noise-opacity: 0.03;
            --font-primary: 'Xanh Mono', 'Courier New', monospace;
            --font-display: 'VT323', monospace;
        }
        body, html {
            height: 100%; margin: 0; padding: 0; background-color: var(--background-color);
            color: var(--main-text-color); font-family: var(--font-primary); font-size: 16px;
            line-height: 1.7; overflow: hidden;
            /* No background-image or animation: noise to ensure clean black background */
        }
        #animation-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
        .container, footer { position: relative; z-index: 1; }
        .container { max-width: 800px; margin: 0 auto; padding: 4vw; min-height: 90vh; display: flex; flex-direction: column; justify-content: flex-start; align-items: flex-start; }
        h1 { font-family: var(--font-display); font-size: 2.5rem; color: var(--accent-color); text-transform: uppercase; margin: 0 0 2rem 0; letter-spacing: 2px; font-weight: normal; border-bottom: 1px solid var(--secondary-text-color); padding-bottom: 0.5rem; align-self: stretch; }
        p { margin-bottom: 1.5rem; width: 100%; }
        footer { text-align: center; padding: 2rem 0; font-size: 0.9rem; color: var(--secondary-text-color); margin-top: auto; width: 100%; }
        @media (max-width: 768px) { h1 { font-size: 2rem; } }
    </style>
</head>
<body>
    <canvas id="animation-canvas"></canvas>
    <div class="container">
        <h1>[Message_of_the_day]</h1>
        <p>Thorfinn has been acting up a lot. I got a cocoon with a butterfly from my therapist but he killed the butterfly. He pissed on my bed last night. He ripped open the lanai but Sophie Justin and I fixed it</p>
    </div>
    <footer><p>
    <script>
        const canvas = document.getElementById('animation-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const asciiPattern = [
            "  ###  ",
            " ##### ",
            "#######",
            " ##### ",
            "  ###  "
        ]; // A simple diamond pattern
        const fontSize = 16;
        let currentScale = 0.5; // Current scaling factor
        const minScale = 0.5;
        const maxScale = 2.0;
        let scaleDirection = 1; // 1 for growing, -1 for shrinking
        const scaleSpeed = 0.005; // Speed of scaling

        const patternWidth = asciiPattern[0].length;
        const patternHeight = asciiPattern.length;

        function drawPattern() {
            ctx.fillStyle = '#000000'; // Pure black background
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.font = `${fontSize * currentScale}px var(--font-display)`; // Scale font size
            ctx.fillStyle = '#FF0000'; // Use bright red for testing visibility
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            const offsetX = (canvas.width / 2) - (patternWidth * fontSize * currentScale / 2);
            const offsetY = (canvas.height / 2) - (patternHeight * fontSize * currentScale / 2);

            for (let y = 0; y < patternHeight; y++) {
                for (let x = 0; x < patternWidth; x++) {
                    const char = asciiPattern[y][x];
                    if (char !== ' ') { // Only draw non-space characters
                        ctx.fillText(char, offsetX + x * fontSize * currentScale + (fontSize * currentScale / 2), offsetY + y * fontSize * currentScale + (fontSize * currentScale / 2));
                    }
                }
            }
        }

        function animate() {
            currentScale += scaleDirection * scaleSpeed;

            if (currentScale >= maxScale) {
                scaleDirection = -1;
            } else if (currentScale <= minScale) {
                scaleDirection = 1;
            }

            drawPattern();
            requestAnimationFrame(animate);
        }
        
        animate();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            // Recalculate center
            // currentScale doesn't need to be reset
        });
    </script>
</body>
</html>
