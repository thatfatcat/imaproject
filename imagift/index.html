<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="3600">
    <title>Digital Flow</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&family=Xanh+Mono:ital@0;1&display=swap');
        :root {
            --background-color: #020305;
            --main-text-color: #b0c4de;
            --accent-color: #3d8bff;
            --secondary-text-color: #6a7380;
            --scanline-opacity: 0.05;
            --noise-opacity: 0.03;
            --font-primary: 'Xanh Mono', 'Courier New', monospace;
            --font-display: 'VT323', monospace;
        }
        body, html {
            height: 100%; margin: 0; padding: 0; background-color: var(--background-color);
            color: var(--main-text-color); font-family: var(--font-primary); font-size: 16px;
            line-height: 1.7; overflow: hidden;
            background-image:
                radial-gradient(ellipse at center, rgba(176, 196, 222, 0.03), transparent 80%),
                repeating-linear-gradient(0deg, transparent, transparent 1px, rgba(255, 255, 255, var(--scanline-opacity)) 1px, rgba(255, 255, 255, var(--scanline-opacity)) 2px);
            animation: noise 1s steps(2) infinite;
        }
        @keyframes noise {
            0%, 100% { background-position: 0 0, 0 0; }
            50% { background-position: 50% 50%, 10px 10px; }
        }
        #lines-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
        .container, footer { position: relative; z-index: 1; }
        .container { max-width: 800px; margin: 0 auto; padding: 4vw; min-height: 90vh; display: flex; flex-direction: column; justify-content: flex-start; align-items: flex-start; }
        h1 { font-family: var(--font-display); font-size: 2.5rem; color: var(--accent-color); text-transform: uppercase; margin: 0 0 2rem 0; letter-spacing: 2px; font-weight: normal; border-bottom: 1px solid var(--secondary-text-color); padding-bottom: 0.5rem; align-self: stretch; }
        p { margin-bottom: 1.5rem; width: 100%; }
        footer { text-align: center; padding: 2rem 0; font-size: 0.9rem; color: var(--secondary-text-color); margin-top: auto; width: 100%; }
        @media (max-width: 768px) { h1 { font-size: 2rem; } }
    </style>
</head>
<body>
    <canvas id="lines-canvas"></canvas>
    <div class="container">
        <h1>[Message_of_the_day]</h1>
        <p>I've decided to compete in Yu Gi Oh again, I'm buying some cards and studying the current game.&nbsp; &nbsp; &nbsp;&nbsp;</p>
    </div>
    <footer></footer>
    <script>
        const canvas = document.getElementById('lines-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const lines = [];
        const numLines = 50;
        const lineColor = 'rgba(61, 139, 255, 0.7)'; // Accent color with some transparency
        const lineLength = 50; // Length of each line segment
        const speed = 2; // Speed of lines moving downwards

        function Line() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.length = Math.random() * lineLength + 20; // Random length for variation
            this.speed = Math.random() * speed + 0.5; // Random speed for variation
            this.opacity = Math.random() * 0.8 + 0.2; // Random opacity
        }

        Line.prototype.draw = function() {
            ctx.beginPath();
            ctx.moveTo(this.x, this.y);
            ctx.lineTo(this.x, this.y + this.length);
            ctx.strokeStyle = `rgba(61, 139, 255, ${this.opacity})`;
            ctx.lineWidth = 1;
            ctx.stroke();
        };

        Line.prototype.update = function() {
            this.y += this.speed;
            if (this.y > canvas.height) {
                this.y = -this.length; // Reset line to top when it goes off screen
                this.x = Math.random() * canvas.width; // New random x position
                this.length = Math.random() * lineLength + 20;
                this.speed = Math.random() * speed + 0.5;
                this.opacity = Math.random() * 0.8 + 0.2;
            }
        };

        for (let i = 0; i < numLines; i++) {
            lines.push(new Line());
        }

        function animate() {
            ctx.fillStyle = 'rgba(2, 3, 5, 0.1)'; // Clear with a slight fade
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            lines.forEach(line => {
                line.update();
                line.draw();
            });

            requestAnimationFrame(animate);
        }
        
        animate();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            // Re-initialize lines or adjust their positions if needed on resize
            lines.forEach(line => {
                line.x = Math.random() * canvas.width;
                line.y = Math.random() * canvas.height;
            });
        });
    </script>
</body>
</html>
