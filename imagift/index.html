<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="3600">
    <title>Animation 37</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&family=Xanh+Mono:ital@0;1&display=swap');
        :root {
            --background-color: #000000;
            --main-text-color: #f0f0f0;
            --accent-color: #ff00ff; /* Magenta */
            --secondary-text-color: #ff99ff;
            --font-primary: 'Xanh Mono', 'Courier New', monospace;
            --font-display: 'VT323', monospace;
        }
        body, html {
            height: 100%; margin: 0; padding: 0; background-color: var(--background-color);
            color: var(--main-text-color); font-family: var(--font-primary); font-size: 16px;
            overflow: hidden;
        }
        #tunnel-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        .container, footer {
            position: relative;
            z-index: 1;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 4vw;
            min-height: 90vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        h1 {
            font-family: var(--font-display);
            font-size: 3rem;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: normal;
            margin-bottom: 1.5rem;
            text-shadow: 0 0 10px var(--accent-color);
        }
        p {
            margin-bottom: 1.5rem;
            width: 100%;
            max-width: 600px;
        }
        footer {
            text-align: center;
            padding: 2rem 0;
            font-size: 0.9rem;
            color: var(--secondary-text-color);
            margin-top: auto;
            width: 100%;
        }
    </style>
</head>
<body>
    <canvas id="tunnel-canvas"></canvas>
    <div class="container">
        <h1>[Message_of_the_day]</h1>
        <p>Therapist agrees with you that I should talk to Joanne. Sophie and Nicole came over today and they cooked some really nice food, played guitar hero, and cleaned the kitchen. I feel a lot better after spending time with them. I'm very worried about the international situation.&nbsp;&nbsp;</p>
    </div>
    <footer><p>

    <script>
        const canvas = document.getElementById('tunnel-canvas');
        const ctx = canvas.getContext('2d');

        let rings = [];
        const numRings = 50; // More rings for a denser tunnel
        const ringSpacing = 15;

        function setup() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            rings = [];
            for (let i = 0; i < numRings; i++) {
                rings.push(new Ring((i * ringSpacing) % (numRings * ringSpacing)));
            }
        }

        class Ring {
            constructor(radius) {
                this.radius = radius;
                this.speed = 1.5;
            }

            update() {
                this.radius += this.speed;
                // Reset ring when it grows large, creating a looping tunnel effect
                if (this.radius > numRings * ringSpacing) {
                    this.radius = 1;
                }
            }

            draw(time) {
                const centerX = canvas.width / 2;
                const centerY = canvas.height / 2;
                
                const progress = this.radius / (numRings * ringSpacing);
                const hue = (progress * 180 + time) % 360;
                
                ctx.beginPath();
                ctx.arc(centerX, centerY, this.radius, 0, Math.PI * 2);
                
                ctx.strokeStyle = `hsl(${hue}, 100%, 70%)`;
                ctx.lineWidth = 1 + progress * 4; // Line gets thicker as it expands
                
                // Use a dashed line to give a text-like, stippled appearance
                ctx.setLineDash([5, 10]);
                ctx.stroke();
            }
        }

        let time = 0;
        function animate() {
            // Use a solid, but slightly transparent background to create motion blur
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Sort rings so the largest are drawn first (in the back)
            rings.sort((a, b) => b.radius - a.radius);

            rings.forEach(ring => {
                ring.update();
                ring.draw(time);
            });
            
            time++;
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', setup);
        setup();
        animate();
    </script>
</body>
</html>
