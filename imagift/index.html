<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="3600">
    <title>Abstract Flow</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&family=Xanh+Mono:ital@0;1&display=swap');
        :root {
            --background-color: #000000; /* Explicitly black */
            --main-text-color: #b0c4de;
            --accent-color: #3d8bff;
            --secondary-text-color: #6a7380;
            --scanline-opacity: 0.05;
            --noise-opacity: 0.03;
            --font-primary: 'Xanh Mono', 'Courier New', monospace;
            --font-display: 'VT323', monospace;
        }
        body, html {
            height: 100%; margin: 0; padding: 0; background-color: var(--background-color);
            color: var(--main-text-color); font-family: var(--font-primary); font-size: 16px;
            line-height: 1.7; overflow: hidden;
            background-image:
                radial-gradient(ellipse at center, rgba(176, 196, 222, 0.03), transparent 80%),
                repeating-linear-gradient(0deg, transparent, transparent 1px, rgba(255, 255, 255, var(--scanline-opacity)) 1px, rgba(255, 255, 255, var(--scanline-opacity)) 2px);
            animation: noise 1s steps(2) infinite;
        }
        @keyframes noise {
            0%, 100% { background-position: 0 0, 0 0; }
            50% { background-position: 50% 50%, 10px 10px; }
        }
        #flowing-lines-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
        .container, footer { position: relative; z-index: 1; }
        .container { max-width: 800px; margin: 0 auto; padding: 4vw; min-height: 90vh; display: flex; flex-direction: column; justify-content: flex-start; align-items: flex-start; }
        h1 { font-family: var(--font-display); font-size: 2.5rem; color: var(--accent-color); text-transform: uppercase; margin: 0 0 2rem 0; letter-spacing: 2px; font-weight: normal; border-bottom: 1px solid var(--secondary-text-color); padding-bottom: 0.5rem; align-self: stretch; }
        p { margin-bottom: 1.5rem; width: 100%; }
        footer { text-align: center; padding: 2rem 0; font-size: 0.9rem; color: var(--secondary-text-color); margin-top: auto; width: 100%; }
        @media (max-width: 768px) { h1 { font-size: 2rem; } }
    </style>
</head>
<body>
    <canvas id="flowing-lines-canvas"></canvas>
    <div class="container">
        <h1>[message_of_the_day]</h1>
        <p>You guys coming makes me feel like when I was in high school and summer break was coming up. Please send me your flight number!</p>
    </div>
    <footer></footer>
    <script>
        const canvas = document.getElementById('flowing-lines-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const lines = [];
        const numLines = 20;
        const lineLength = 200;
        const lineSpeed = 1;
        let time = 0;

        class FlowingLine {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.angle = Math.random() * Math.PI * 2; // Initial direction
                this.speed = Math.random() * 0.5 + 0.5; // Variation in speed
                this.colorHue = Math.random() * 360;
                this.lineWidth = Math.random() * 2 + 1;
            }

            update() {
                // Subtle change in angle over time
                this.angle += Math.sin(time * 0.01 + this.x * 0.01) * 0.05;

                this.x += Math.cos(this.angle) * this.speed * lineSpeed;
                this.y += Math.sin(this.angle) * this.speed * lineSpeed;

                // Wrap around edges
                if (this.x < -lineLength) this.x = canvas.width + lineLength;
                if (this.x > canvas.width + lineLength) this.x = -lineLength;
                if (this.y < -lineLength) this.y = canvas.height + lineLength;
                if (this.y > canvas.height + lineLength) this.y = -lineLength;

                this.colorHue = (this.colorHue + 0.1) % 360; // Gently shift hue
            }

            draw() {
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x - Math.cos(this.angle) * lineLength, this.y - Math.sin(this.angle) * lineLength);
                ctx.strokeStyle = `hsla(${this.colorHue}, 80%, 60%, 0.8)`;
                ctx.lineWidth = this.lineWidth;
                ctx.stroke();
            }
        }

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            lines.length = 0; // Clear existing lines on resize
            for (let i = 0; i < numLines; i++) {
                lines.push(new FlowingLine());
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)'; // Black background with subtle fade
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            lines.forEach(line => {
                line.update();
                line.draw();
            });

            time += 0.1; // Increment global time for animation variation

            requestAnimationFrame(animate);
        }

        init();
        animate();

        window.addEventListener('resize', init);
    </script>
</body>
</html>
