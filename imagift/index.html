<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="3600">
    <title>Animation 15</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&family=Xanh+Mono:ital@0;1&display=swap');
        :root {
            --background-color: #000000;
            --main-text-color: #f0f0f0;
            --accent-color: #ffffff; /* White for a classic constellation look */
            --secondary-text-color: #cccccc;
            --font-primary: 'Xanh Mono', 'Courier New', monospace;
            --font-display: 'VT323', monospace;
        }
        body, html {
            height: 100%; margin: 0; padding: 0; background-color: var(--background-color);
            color: var(--main-text-color); font-family: var(--font-primary); font-size: 16px;
            overflow: hidden;
        }
        #constellation-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        .container, footer {
            position: relative;
            z-index: 1;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 4vw;
            min-height: 90vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        h1 {
            font-family: var(--font-display);
            font-size: 3rem;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: normal;
            margin-bottom: 1.5rem;
            text-shadow: 0 0 10px var(--accent-color);
        }
        p {
            margin-bottom: 1.5rem;
            width: 100%;
            max-width: 600px;
        }
        footer {
            text-align: center;
            padding: 2rem 0;
            font-size: 0.9rem;
            color: var(--secondary-text-color);
            margin-top: auto;
            width: 100%;
        }
    </style>
</head>
<body>
    <canvas id="constellation-canvas"></canvas>
    <div class="container">
        <h1>[Message_of_the_day]</h1>
        <p>project of the day: I'm making an app that makes adding stuff to my budget sheet a lot easier and timestamps it.&nbsp;</p>
    </div>
    <footer><p>

    <script>
        const canvas = document.getElementById('constellation-canvas');
        const ctx = canvas.getContext('2d');

        let particles = [];
        const numParticles = 100;
        const connectDistance = 150;
        const particleChars = ['*', '+', 'o', 'O'];
        const lineChar = '.';

        function initializeParticles() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < numParticles; i++) {
                particles.push(createParticle());
            }
        }

        function createParticle() {
            return {
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 10 + 10,
                vx: Math.random() * 1 - 0.5,
                vy: Math.random() * 1 - 0.5,
                character: particleChars[Math.floor(Math.random() * particleChars.length)]
            };
        }

        function drawAsciiLine(p1, p2, opacity) {
            const dx = p2.x - p1.x;
            const dy = p2.y - p1.y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            const steps = distance / 10; // Draw a character every 10 pixels

            ctx.fillStyle = `rgba(255, 255, 255, ${opacity})`;
            ctx.font = `10px ${getComputedStyle(document.body).getPropertyValue('--font-primary')}`;

            for (let i = 0; i < steps; i++) {
                const x = p1.x + (dx / steps) * i;
                const y = p1.y + (dy / steps) * i;
                ctx.fillText(lineChar, x, y);
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const accentColor = getComputedStyle(document.documentElement).getPropertyValue('--accent-color').trim();

            for (let i = 0; i < particles.length; i++) {
                const p1 = particles[i];
                p1.x += p1.vx;
                p1.y += p1.vy;

                if (p1.x < 0 || p1.x > canvas.width) p1.vx *= -1;
                if (p1.y < 0 || p1.y > canvas.height) p1.vy *= -1;

                ctx.fillStyle = accentColor;
                ctx.font = `${p1.size}px ${getComputedStyle(document.body).getPropertyValue('--font-primary')}`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(p1.character, p1.x, p1.y);

                for (let j = i + 1; j < particles.length; j++) {
                    const p2 = particles[j];
                    const dx = p1.x - p2.x;
                    const dy = p1.y - p2.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < connectDistance) {
                        drawAsciiLine(p1, p2, 1 - distance / connectDistance);
                    }
                }
            }
        }

        function animate() {
            draw();
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', initializeParticles);
        initializeParticles();
        animate();
    </script>
</body>
</html>
