<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="3600">
    <title>Animation 25</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&family=Xanh+Mono:ital@0;1&display=swap');
        :root {
            --background-color: #00001a; /* Very dark blue */
            --main-text-color: #f0f0f0;
            --accent-color: #ffffff;
            --secondary-text-color: #ddddff;
            --font-primary: 'Xanh Mono', 'Courier New', monospace;
            --font-display: 'VT323', monospace;
        }
        body, html {
            height: 100%; margin: 0; padding: 0; background-color: var(--background-color);
            color: var(--main-text-color); font-family: var(--font-primary); font-size: 16px;
            overflow: hidden;
        }
        #snow-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        .container, footer {
            position: relative;
            z-index: 1;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 4vw;
            min-height: 90vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        h1 {
            font-family: var(--font-display);
            font-size: 3rem;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: normal;
            margin-bottom: 1.5rem;
            text-shadow: 0 0 10px var(--accent-color);
        }
        p {
            margin-bottom: 1.5rem;
            width: 100%;
            max-width: 600px;
        }
        footer {
            text-align: center;
            padding: 2rem 0;
            font-size: 0.9rem;
            color: var(--secondary-text-color);
            margin-top: auto;
            width: 100%;
        }
    </style>
</head>
<body>
    <canvas id="snow-canvas"></canvas>
    <div class="container">
        <h1>[Message_of_the_day]</h1>
        <p>My therapist says that it would be good for me to try to get good at something competitive again like how I was with Judo, Counter Strike, and Yu Gi Oh. I'm not sure what to go for but I agree with her.&nbsp;&nbsp;</p>
    </div>
    <footer><p>

    <script>
        const canvas = document.getElementById('snow-canvas');
        const ctx = canvas.getContext('2d');

        let snowflakes = [];
        const numFlakes = 400;
        const snowChars = ['*', '.', '`'];

        function initializeSnow() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            snowflakes = [];
            for (let i = 0; i < numFlakes; i++) {
                snowflakes.push(createFlake());
            }
        }

        function createFlake() {
            return {
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 10 + 5,
                speed: Math.random() * 1 + 0.5,
                wind: Math.random() * 1 - 0.5,
                character: snowChars[Math.floor(Math.random() * snowChars.length)],
                opacity: Math.random() * 0.5 + 0.3
            };
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for (let i = 0; i < snowflakes.length; i++) {
                const flake = snowflakes[i];

                flake.y += flake.speed;
                flake.x += flake.wind;
                
                // Add a little side-to-side wobble
                flake.x += Math.sin(flake.y / 50) * 0.2;

                if (flake.y > canvas.height) {
                    flake.y = -flake.size;
                    flake.x = Math.random() * canvas.width;
                }
                if (flake.x > canvas.width) {
                    flake.x = 0;
                }
                if (flake.x < 0) {
                    flake.x = canvas.width;
                }
                
                ctx.font = `${flake.size}px ${getComputedStyle(document.body).getPropertyValue('--font-primary')}`;
                ctx.fillStyle = `rgba(255, 255, 255, ${flake.opacity})`;
                ctx.fillText(flake.character, flake.x, flake.y);
            }
        }

        function animate() {
            draw();
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', initializeSnow);
        initializeSnow();
        animate();
    </script>
</body>
</html>
