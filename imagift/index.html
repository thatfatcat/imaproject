<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="3600">
    <title>Organic Flow</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&family=Xanh+Mono:ital@0;1&display=swap');
        :root {
            --background-color: #020305;
            --main-text-color: #b0c4de;
            --accent-color: #3d8bff;
            --secondary-text-color: #6a7380;
            --scanline-opacity: 0.05;
            --noise-opacity: 0.03;
            --font-primary: 'Xanh Mono', 'Courier New', monospace;
            --font-display: 'VT323', monospace;
        }
        body, html {
            height: 100%; margin: 0; padding: 0; background-color: var(--background-color);
            color: var(--main-text-color); font-family: var(--font-primary); font-size: 16px;
            line-height: 1.7; overflow: hidden;
            background-image:
                radial-gradient(ellipse at center, rgba(176, 196, 222, 0.03), transparent 80%),
                repeating-linear-gradient(0deg, transparent, transparent 1px, rgba(255, 255, 255, var(--scanline-opacity)) 1px, rgba(255, 255, 255, var(--scanline-opacity)) 2px);
            animation: noise 1s steps(2) infinite;
        }
        @keyframes noise {
            0%, 100% { background-position: 0 0, 0 0; }
            50% { background-position: 50% 50%, 10px 10px; }
        }
        #fluid-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
        .container, footer { position: relative; z-index: 1; }
        .container { max-width: 800px; margin: 0 auto; padding: 4vw; min-height: 90vh; display: flex; flex-direction: column; justify-content: flex-start; align-items: flex-start; }
        h1 { font-family: var(--font-display); font-size: 2.5rem; color: var(--accent-color); text-transform: uppercase; margin: 0 0 2rem 0; letter-spacing: 2px; font-weight: normal; border-bottom: 1px solid var(--secondary-text-color); padding-bottom: 0.5rem; align-self: stretch; }
        p { margin-bottom: 1.5rem; width: 100%; }
        footer { text-align: center; padding: 2rem 0; font-size: 0.9rem; color: var(--secondary-text-color); margin-top: auto; width: 100%; }
        @media (max-width: 768px) { h1 { font-size: 2rem; } }
    </style>
</head>
<body>
    <canvas id="fluid-canvas"></canvas>
    <div class="container">
        <h1>[message_of_the_day]</h1>
        <p>Having a date right now with Sarah! It's goingreally well and were having a good time. Also excited for the party tomorrow and for you guys to visit soon.&nbsp;</p>
    </div>
    <footer></footer>
    <script>
        const canvas = document.getElementById('fluid-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const metaballs = [];
        const numMetaballs = 10;
        const maxRadius = 50;
        const minRadius = 20;

        class Metaball {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.radius = Math.random() * (maxRadius - minRadius) + minRadius;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.color = `hsl(${Math.random() * 360}, 70%, 50%)`;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                if (this.x + this.radius > canvas.width || this.x - this.radius < 0) {
                    this.vx *= -1;
                }
                if (this.y + this.radius > canvas.height || this.y - this.radius < 0) {
                    this.vy *= -1;
                }
            }
        }

        for (let i = 0; i < numMetaballs; i++) {
            metaballs.push(new Metaball());
        }

        function drawMetaballs() {
            // Create an off-screen canvas for rendering metaballs
            const offscreenCanvas = document.createElement('canvas');
            offscreenCanvas.width = canvas.width;
            offscreenCanvas.height = canvas.height;
            const offscreenCtx = offscreenCanvas.getContext('2d');

            // Draw each metaball with a radial gradient
            metaballs.forEach(mb => {
                const gradient = offscreenCtx.createRadialGradient(mb.x, mb.y, 0, mb.x, mb.y, mb.radius);
                gradient.addColorStop(0, `rgba(61, 139, 255, 0.8)`); // Core
                gradient.addColorStop(0.7, `rgba(61, 139, 255, 0.4)`); // Outer blur
                gradient.addColorStop(1, `rgba(61, 139, 255, 0)`); // Fully transparent
                
                offscreenCtx.fillStyle = gradient;
                offscreenCtx.beginPath();
                offscreenCtx.arc(mb.x, mb.y, mb.radius, 0, Math.PI * 2);
                offscreenCtx.fill();
            });

            // Apply blur and blending to create the metaball effect
            ctx.filter = `blur(15px)`;
            ctx.drawImage(offscreenCanvas, 0, 0);
            ctx.filter = 'none';

            // Draw a second pass with solid color to make them more opaque
            ctx.globalCompositeOperation = 'lighter';
            metaballs.forEach(mb => {
                ctx.fillStyle = `rgba(61, 139, 255, 0.9)`;
                ctx.beginPath();
                ctx.arc(mb.x, mb.y, mb.radius * 0.7, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalCompositeOperation = 'source-over';
        }

        function animate() {
            ctx.fillStyle = 'rgba(2, 3, 5, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            metaballs.forEach(mb => mb.update());
            drawMetaballs();

            requestAnimationFrame(animate);
        }
        
        animate();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            // No need to re-initialize metaballs as they adjust their bounds.
        });
    </script>
</body>
</html>
