<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="3600">
    <title>System Scan</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&family=Xanh+Mono:ital@0;1&display=swap');
        :root {
            --background-color: #020305;
            --main-text-color: #b0c4de;
            --accent-color: #3d8bff;
            --secondary-text-color: #6a7380;
            --scanline-opacity: 0.05;
            --noise-opacity: 0.03;
            --font-primary: 'Xanh Mono', 'Courier New', monospace;
            --font-display: 'VT323', monospace;
        }
        body, html {
            height: 100%; margin: 0; padding: 0; background-color: var(--background-color);
            color: var(--main-text-color); font-family: var(--font-primary); font-size: 16px;
            line-height: 1.7; overflow: hidden;
            background-image:
                radial-gradient(ellipse at center, rgba(176, 196, 222, 0.03), transparent 80%),
                repeating-linear-gradient(0deg, transparent, transparent 1px, rgba(255, 255, 255, var(--scanline-opacity)) 1px, rgba(255, 255, 255, var(--scanline-opacity)) 2px);
            animation: noise 1s steps(2) infinite;
        }
        @keyframes noise {
            0%, 100% { background-position: 0 0, 0 0; }
            50% { background-position: 50% 50%, 10px 10px; }
        }
        #scan-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
        .container, footer { position: relative; z-index: 1; }
        .container { max-width: 800px; margin: 0 auto; padding: 4vw; min-height: 90vh; display: flex; flex-direction: column; justify-content: flex-start; align-items: flex-start; }
        h1 { font-family: var(--font-display); font-size: 2.5rem; color: var(--accent-color); text-transform: uppercase; margin: 0 0 2rem 0; letter-spacing: 2px; font-weight: normal; border-bottom: 1px solid var(--secondary-text-color); padding-bottom: 0.5rem; align-self: stretch; }
        p { margin-bottom: 1.5rem; width: 100%; }
        footer { text-align: center; padding: 2rem 0; font-size: 0.9rem; color: var(--secondary-text-color); margin-top: auto; width: 100%; }
        @media (max-width: 768px) { h1 { font-size: 2rem; } }
    </style>
</head>
<body>
    <canvas id="scan-canvas"></canvas>
    <div class="container">
        <h1>[Message_of_the_day]</h1>
        <p>Cleaned so much of the house today, but there's still a lot to do. Taking tomorrow off too.</p> <p>Silly question for yall: Would you raher have the ability to teleport, or the ability to rewind time? What would be your most important applications for these powers?</p>
    </div>
    <footer></footer>
    <script>
        const canvas = document.getElementById('scan-canvas');
        const ctx = canvas.getContext('2d');

        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()_+-=[]{}|;:",.<>/?`~ ';
        const fontSize = 12;
        let cols;
        let rows;
        let charGrid;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            cols = Math.floor(canvas.width / fontSize);
            rows = Math.floor(canvas.height / fontSize);
            charGrid = Array(cols * rows).fill(0).map(() => ({
                char: chars[Math.floor(Math.random() * chars.length)],
                opacity: 0,
                targetOpacity: Math.random(),
                fadeSpeed: Math.random() * 0.05 + 0.01,
                delay: Math.random() * 100
            }));
            ctx.font = `${fontSize}px 'VT323', monospace`;
            ctx.textAlign = 'left';
            ctx.textBaseline = 'top';
        }

        function animate() {
            ctx.fillStyle = 'rgba(2, 3, 5, 0.08)'; // Clear with a slight fade
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < charGrid.length; i++) {
                const charData = charGrid[i];
                const x = (i % cols) * fontSize;
                const y = Math.floor(i / cols) * fontSize;

                if (charData.delay > 0) {
                    charData.delay--;
                    continue;
                }

                if (charData.opacity < charData.targetOpacity) {
                    charData.opacity += charData.fadeSpeed;
                    if (charData.opacity > charData.targetOpacity) charData.opacity = charData.targetOpacity;
                } else if (charData.opacity > charData.targetOpacity) {
                    charData.opacity -= charData.fadeSpeed;
                    if (charData.opacity < charData.targetOpacity) charData.opacity = charData.targetOpacity;
                }

                // Randomly change characters and target opacity for dynamic effect
                if (Math.random() < 0.005) { // Small chance to trigger change
                    charData.char = chars[Math.floor(Math.random() * chars.length)];
                    charData.targetOpacity = Math.random() * 0.3; // Less bright
                    charData.fadeSpeed = Math.random() * 0.05 + 0.01;
                }

                ctx.fillStyle = `rgba(0, 50, 0, ${charData.opacity})`; // Darker green color
                ctx.fillText(charData.char, x, y);
            }

            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas(); // Initial setup
        animate();
    </script>
</body>
</html>
