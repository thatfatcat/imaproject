<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="3600">
    <title>Animation 24</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&family=Xanh+Mono:ital@0;1&display=swap');
        :root {
            --background-color: #000000;
            --main-text-color: #f0f0f0;
            --accent-color: #4a90e2; /* Cool blue */
            --secondary-text-color: #88dddd;
            --font-primary: 'Xanh Mono', 'Courier New', monospace;
            --font-display: 'VT323', monospace;
        }
        body, html {
            height: 100%; margin: 0; padding: 0; background-color: var(--background-color);
            color: var(--main-text-color); font-family: var(--font-primary); font-size: 16px;
            overflow: hidden;
        }
        #moire-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        .container, footer {
            position: relative;
            z-index: 1;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 4vw;
            min-height: 90vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        h1 {
            font-family: var(--font-display);
            font-size: 3rem;
            color: ghostwhite;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: normal;
            margin-bottom: 1.5rem;
            text-shadow: 0 0 10px var(--accent-color);
        }
        p {
            margin-bottom: 1.5rem;
            width: 100%;
            max-width: 600px;
        }
        footer {
            text-align: center;
            padding: 2rem 0;
            font-size: 0.9rem;
            color: var(--secondary-text-color);
            margin-top: auto;
            width: 100%;
        }
        .styled-image {
            max-width: 90%; /* Responsive image */
            height: auto;
            border: 2px solid var(--accent-color);
            padding: 5px;
            background-color: rgba(74, 144, 226, 0.05); /* Transparent version of accent */
            box-shadow: 0 0 15px var(--accent-color);
            margin-top: 2rem;
        }
    </style>
</head>
<body>
    <canvas id="moire-canvas"></canvas>
    <div class="container">
        <h1>[Message_of_the_day]</h1>
        <img src="http://nonamer.xyz/media/nart.jpg" alt="Digital art by Nart" class="styled-image">
    </div>
    <footer><p>

    <script>
        const canvas = document.getElementById('moire-canvas');
        const ctx = canvas.getContext('2d');

        let time = 0;
        const spacing = 15;
        const char = '#';

        function setup() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function drawCirclePattern(centerX, centerY, offset) {
            ctx.font = '12px ' + getComputedStyle(document.body).getPropertyValue('--font-primary');
            ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--accent-color');
            ctx.textAlign = 'center';

            for (let r = 0; r < Math.max(canvas.width, canvas.height) / 1.5; r += spacing) {
                const circumference = 2 * Math.PI * r;
                const numChars = circumference / (spacing / 2);
                for (let i = 0; i < numChars; i++) {
                    const angle = (i / numChars) * 2 * Math.PI + offset;
                    const x = centerX + r * Math.cos(angle);
                    const y = centerY + r * Math.sin(angle);
                    ctx.fillText(char, x, y);
                }
            }
        }

        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)'; // Fading effect
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw first pattern (static)
            drawCirclePattern(canvas.width / 2, canvas.height / 2, 0);

            // Draw second pattern (now only rotating, not moving)
            drawCirclePattern(canvas.width / 2, canvas.height / 2, time * 0.02);

            time++;
        }

        function animate() {
            draw();
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', setup);
        setup();
        animate();
    </script>
</body>
</html>
